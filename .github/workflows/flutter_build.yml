name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Flutter Boilerplate (Preserving our lib folder)
        run: |
          mkdir -p temp_lib
          cp -r lib/* temp_lib/
          flutter create --org com.s34nyun_maker --project-name rc_car --force .
          rm -rf lib
          mv temp_lib lib

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: paddock-pro-apk
          path: build/app/outputs/flutter-apk/app-release.apk
