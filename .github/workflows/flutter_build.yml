name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Flutter Boilerplate
        run: |
          # Create temporary project in a clean directory to avoid any conflicts
          flutter create --org com.s34nyun_maker --project-name rc_car temp_project
          
          # Copy all platform-specific folders and configuration, preserving our custom lib folder
          cp -r temp_project/android .
          cp -r temp_project/ios .
          cp -r temp_project/web .
          cp temp_project/pubspec.yaml .
          
          # Remove the temporary project
          rm -rf temp_project

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          echo "Building APK..."
          if ! flutter build apk --release > build_log.txt 2>&1; then
            echo "========================================================="
            echo "=== BUILD FAILED. PRINTING LAST 150 LINES OF BUILD LOG ==="
            echo "========================================================="
            tail -n 150 build_log.txt
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: paddock-pro-apk
          path: build/app/outputs/flutter-apk/app-release.apk
